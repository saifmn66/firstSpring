<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Ajouter un nouveau Film</title>
    -
</head>
<body>
<div class="container">
    <h1>Saisir un nouveau Film</h1>
    <form action="/films/add" method="post">
        <p>
            <label for="titre" class="form-label">Titre du film : </label>
            <input type="text" name="title" id="title" class="form-control" required >

        </p>
        <p>
            <label for="description" class="form-label">Description : </label>
            <textarea rows="5" class="form-control" name="description" id="description"></textarea>
        </p>
        <p>
            <label for="annee" class="form-label">Année parution : </label>
            <input type="number" min="1900"  name="releaseYear" id="releaseYear" class="form-control" required>
        </p>

        <p>
            <label for="categories" class="form-label">Catégorie : </label>
            <select name="categories" class="form-select" id="categories">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </p>

        <p>
            <label for="Acteurs" class="form-label">Acteurs : </label>
            <select name="Acteurs" class="form-select" id="acteurs" multiple>
                <option th:each="act : ${acteurs}" th:value="${act.id}" th:text="${act.nom}"></option>
            </select>
        </p>

        <p><input type="submit" class="btn btn-outline-primary" value="Ajouter">
                    <input type="reset" class="btn btn-outline-secondary" value="Effacer">
                </p>
    </form>
</div>
</body>
</html>
